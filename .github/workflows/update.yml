name: Update free IPTV playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 gzip

      - name: Run IPTV checker
        run: |
          python3 scripts/check_iptv.py

      - name: Show final report in console
        run: |
          echo ""
          echo "========== Generated files =========="
          find public -maxdepth 3 -type f -print | sort
          echo ""
          echo "========== Report summary =========="
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("public/data/report.json").read_text())

          print(f"Started: {report['started_at']}")
          print(f"Finished: {report['finished_at']}")
          print(f"Total channels: {report['total_channels']}")
          print(f"Working channels: {report['working_channels']}")
          print(f"Broken channels: {report['broken_channels']}")
          print(f"Success rate: {report['success_rate_percent']}%")
          print(f"EPG channels: {report['epg']['channel_count']}")
          print(f"EPG programme lines: {report['epg']['programme_count']}")
          PY

      - name: Commit updated public files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update free IPTV playlist, EPG, and status page"
            git push
          fi
